#:schema node_modules/wrangler/config-schema.json
name = "bushi"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ---------------------------------------------------------------------------
# D1 — relational source of record. Create with:
#   wrangler d1 create bushi-db   (paste the returned database_id below)
# Migrations live in the @bushi/db package (see migrations_dir below).
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "bushi-db"
database_id = "79484850-e353-4008-a7ca-be44d8a08163"
migrations_dir = "../../packages/db/migrations"

# ---------------------------------------------------------------------------
# Durable Objects — live mat rooms (WebSocket scoring state).
# ---------------------------------------------------------------------------
[[durable_objects.bindings]]
name = "MAT_ROOM"
class_name = "MatRoom"

# SQLite-backed Durable Objects (required on the Workers Free plan and the
# current default). MatRoom persists via ctx.storage, which is SQLite-compatible.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["MatRoom"]

# ---------------------------------------------------------------------------
# KV — hot lookups, feature flags, ephemeral caches.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "CACHE"
id = "d07724c7d64c458bbd96b2e74230f306"

[[kv_namespaces]]
binding = "FEATURE_FLAGS"
id = "911f692b381643d78d51ad7bd7248168"

# ---------------------------------------------------------------------------
# R2 — assets, uploads, generated graphics, PDFs, media.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "bushi-assets"

[[r2_buckets]]
binding = "GENERATED"
bucket_name = "bushi-generated"

# ---------------------------------------------------------------------------
# Queues — background jobs & async fan-out.
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "JOBS"
queue = "bushi-jobs"

[[queues.consumers]]
queue = "bushi-jobs"
max_batch_size = 10
max_batch_timeout = 30

# ---------------------------------------------------------------------------
# Workers AI — text + image (FLUX) inference. AI Gateway id optional (var).
# ---------------------------------------------------------------------------
[ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Vectorize — embeddings / semantic search.
#   wrangler vectorize create bushi-search --dimensions=768 --metric=cosine
# ---------------------------------------------------------------------------
[[vectorize]]
binding = "SEARCH_INDEX"
index_name = "bushi-search"

# ---------------------------------------------------------------------------
# Browser Rendering — share cards, posters, OG images, PDFs.
# ---------------------------------------------------------------------------
[browser]
binding = "BROWSER"

# ---------------------------------------------------------------------------
# Cloudflare Email Sending — native `send_email` binding (no third-party key).
# The sender domain must be verified in Email Routing. `destination_address`
# may be set to restrict recipients; omit for a verified domain / catch-all.
# ---------------------------------------------------------------------------
[[send_email]]
name = "SEND_EMAIL"

# ---------------------------------------------------------------------------
# Cron — nightly tournament discovery (Perplexity → D1). No-ops without
# PERPLEXITY_API_KEY set.
# ---------------------------------------------------------------------------
[triggers]
crons = ["0 7 * * *"]

[vars]
ENVIRONMENT = "development"
AI_GATEWAY_ID = ""
APP_BASE_URL = "http://localhost:5173"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put <NAME>`; never commit real values):
#   SESSION_SECRET, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, PERPLEXITY_API_KEY
# (Email uses the native send_email binding above — no API key needed.)
# PERPLEXITY_API_KEY powers the discovery cron + on-demand web search.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Cloudflare Workflows (uncomment once the Workflow classes are bundled here):
# [[workflows]]
# name = "pre-event-promotion"
# binding = "PRE_EVENT_PROMOTION"
# class_name = "PreEventPromotionWorkflow"
#
# [[workflows]]
# name = "post-event-content"
# binding = "POST_EVENT_CONTENT"
# class_name = "PostEventContentWorkflow"
# ---------------------------------------------------------------------------
